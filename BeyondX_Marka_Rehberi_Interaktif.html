<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BeyondX · Marka Rehberi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap');
  :root{
    --ink:#1d2433; --muted:#5b6577; --soft:#8a93a3; --line:#e6e8ee; --bg:#f6f7f9; --card:#ffffff;
    --accent:#283EC4; --accent-soft:#ECEEFC; --accent-deep:#1C2A8C;
    --meta:#3b5bdb; --meta-soft:#eaeefb; --google:#d9822b; --google-soft:#fbeede; --tiktok:#111418; --tiktok-soft:#eceef0;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;color:var(--ink);background:var(--bg);line-height:1.6;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:1080px;margin:0 auto;padding:0 22px;}

  header.top{background:#fff;border-bottom:1px solid var(--line);}
  .top-inner{display:flex;align-items:center;justify-content:space-between;padding:18px 0 16px;flex-wrap:wrap;gap:10px;}
  .brandmark{display:flex;align-items:center;gap:14px;}
  .brandmark img{height:26px;width:auto;display:block;}
  .brandmark .divider{width:1px;height:24px;background:var(--line);}
  .brandmark .ttl{font-family:'Fraunces',serif;font-size:21px;font-weight:600;letter-spacing:-.01em;}
  .brandmark .ttl span{color:var(--accent);}
  .top .meta-line{font-size:11px;color:var(--soft);letter-spacing:.04em;}

  nav.tabs{position:sticky;top:0;z-index:20;background:rgba(246,247,249,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);}
  .tabs-inner{display:flex;flex-wrap:wrap;gap:7px;padding:12px 0;}
  .tab{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:#fff;color:var(--muted);
       font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:30px;cursor:pointer;transition:.15s;white-space:nowrap;font-family:inherit;}
  .tab:hover{border-color:var(--accent);color:var(--accent);}
  .tab .dot{width:7px;height:7px;border-radius:50%;display:inline-block;}
  .tab .dot.meta{background:var(--meta);} .tab .dot.google{background:var(--google);} .tab .dot.tiktok{background:var(--tiktok);}
  .tab .dots{display:inline-flex;gap:3px;}
  .tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .tab.active .dot{outline:1.5px solid rgba(255,255,255,.55);}
  .tab.overview{font-family:'Fraunces',serif;font-weight:600;}

  main{padding:28px 0 60px;}

  /* PANEL CARD */
  .panel{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:0;overflow:hidden;
         box-shadow:0 1px 2px rgba(20,30,60,.04),0 12px 30px -18px rgba(20,30,60,.18);animation:fade .25s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
  .panel-head{padding:24px 28px 18px;border-bottom:1px solid var(--line);position:relative;}
  .panel-head::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px;background:var(--accent);}
  .panel-head .name{font-family:'Fraunces',serif;font-size:30px;font-weight:600;letter-spacing:-.01em;}
  .panel-head .cat{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--soft);font-weight:600;margin-top:4px;}
  .panel-head .badges{margin-top:12px;display:flex;gap:6px;}
  .badge{font-size:9.5px;font-weight:700;letter-spacing:.04em;padding:3px 9px;border-radius:20px;text-transform:uppercase;}
  .badge.meta{background:var(--meta-soft);color:var(--meta);} .badge.google{background:var(--google-soft);color:var(--google);} .badge.tiktok{background:var(--tiktok-soft);color:var(--tiktok);}

  .panel-body{padding:22px 28px 26px;}
  .row{display:flex;gap:18px;padding:9px 0;border-bottom:1px solid #f1f2f6;}
  .row:first-child{padding-top:0;}
  .row .k{flex:0 0 130px;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--soft);font-weight:700;padding-top:2px;}
  .row .v{flex:1;font-size:14px;color:var(--muted);} .row .v strong{color:var(--ink);font-weight:600;}

  .metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin:20px 0 4px;}
  .metric{background:#f7f9fb;border:1px solid var(--line);border-radius:12px;padding:12px 15px;}
  .metric .ml{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--soft);font-weight:700;}
  .metric .mv{font-size:19px;font-weight:700;color:var(--accent);margin-top:3px;line-height:1.15;}

  .note{margin-top:18px;background:var(--accent-soft);border-radius:12px;padding:13px 16px;font-size:13px;color:var(--accent-deep);}
  .note b{font-weight:700;}

  .hususlar{margin-top:18px;padding-top:16px;border-top:1px dashed var(--line);}
  .hususlar .ht{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:800;margin-bottom:9px;}
  .hususlar ul{list-style:none;}
  .hususlar li{position:relative;padding-left:17px;font-size:13px;color:var(--muted);line-height:1.55;margin-bottom:7px;}
  .hususlar li:last-child{margin-bottom:0;}
  .hususlar li::before{content:"";position:absolute;left:3px;top:8px;width:4px;height:4px;border-radius:50%;background:var(--accent);}
  .hususlar li strong{color:var(--ink);font-weight:600;}

  .navbtns{display:flex;justify-content:space-between;margin-top:18px;gap:10px;}
  .navbtn{flex:0 0 auto;border:1px solid var(--line);background:#fff;color:var(--muted);font-size:12.5px;font-weight:600;
          padding:9px 16px;border-radius:10px;cursor:pointer;font-family:inherit;transition:.15s;}
  .navbtn:hover{border-color:var(--accent);color:var(--accent);}
  .navbtn:disabled{opacity:.35;cursor:default;}

  /* OVERVIEW */
  .ov-kicker{font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:8px;}
  .ov h2{font-family:'Fraunces',serif;font-size:27px;font-weight:600;letter-spacing:-.01em;margin-bottom:14px;}
  .ov .panel-body p{font-size:14px;color:var(--muted);margin-bottom:11px;max-width:760px;} .ov .panel-body p strong{color:var(--ink);font-weight:600;}
  table.summary{width:100%;border-collapse:collapse;margin-top:8px;font-size:12.5px;}
  table.summary thead th{text-align:left;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--soft);font-weight:700;padding:0 10px 9px;border-bottom:2px solid var(--ink);}
  table.summary td{padding:9px 10px;border-bottom:1px solid var(--line);color:var(--muted);vertical-align:top;}
  table.summary td.brand{font-weight:700;color:var(--ink);white-space:nowrap;cursor:pointer;}
  table.summary td.brand:hover{color:var(--accent);}
  table.summary tbody tr:hover{background:#fafbfc;}
  .pill{font-size:8px;font-weight:700;padding:2px 7px;border-radius:10px;margin-right:3px;}
  .pill.meta{background:var(--meta-soft);color:var(--meta);} .pill.google{background:var(--google-soft);color:var(--google);} .pill.tiktok{background:var(--tiktok-soft);color:var(--tiktok);}
  .tbl-foot{margin-top:11px;font-size:11px;color:var(--soft);}

  footer.foot{border-top:1px solid var(--line);padding:18px 0;font-size:11px;color:var(--soft);display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px;}

  @media(max-width:640px){
    .row{flex-direction:column;gap:3px;} .row .k{flex:none;}
    .panel-head,.panel-body{padding-left:20px;padding-right:20px;}
    .brandmark .ttl{font-size:18px;}
  }
</style>
</head>

gle</span>", "Tatlı, anlaşması kolay biri", "~10", "15K ₺"], ["MAD", "<span class=\"pill meta\">Meta</span> <span class=\"pill google\">Google</span>", "Toplantısız, Deniz üzerinden iletişim", "15+ (25+)*", "30–150K ₺"], ["Melissa", "<span class=\"pill meta\">Meta</span>", "Çok tatlı sahibi, çok güçlü performans", "23+ (35+)*", "80K ₺"], ["Müjgan", "<span class=\"pill meta\">Meta</span>", "Dost insanlar, konser odaklı", "8–9", "Konsere göre"], ["Nebyan", "<span class=\"pill google\">Google</span>", "İyi ama zorlu, kalabalık toplantılı taraf", "30–35+", "~120K ₺"], ["Occleus", "<span class=\"pill meta\">Meta</span>", "Çok tatlı ve bilgili biri", "8–9", "70–80K ₺"], ["Ozcorp", "<span class=\"pill google\">Google</span>", "Çok tatlı, kafa dengi biri (lead odaklı)", "Lead odaklı", "35–45K ₺"], ["Plentia", "<span class=\"pill meta\">Meta</span>", "Çok tatlı, anlaşması kolay biri", "6+", "60–80K ₺"], ["SuCo", "<span class=\"pill google\">Google</span>", "Toplantısız, Deniz üzerinden emir iletişimi", "2–9", "45–160K ₺"], ["Wedsgo", "<span class=\"pill meta\">Meta</span>", "Tatlı ve çalışkan, Hazal üzerinden iletişim", "Mesaj odaklı", "450–500K ₺"], ["Turuncu / Derya", "<span class=\"pill meta\">Meta</span>", "Deniz üzerinden iletişim, dönemsel", "Etkinlik odaklı", "~10K ₺/ay"]], "foot": "* Parantez içindeki ROAS değerleri Eczaclick'te <b style=\"color:#5b6577;\">son dönem</b>, MAD · Hevsel · Melissa'da ise <b style=\"color:#5b6577;\">indirim dönemi</b> ROAS'larını gösterir."}};
const brands = DATA.brands, extra = DATA.extra;
const platName = {meta:"Meta Ads", google:"Google Ads", tiktok:"TikTok Ads"};
let active = "ov";

function esc(s){return s;}

function tabBar(){
  const t = document.getElementById("tabs");
  let h = `<button class="tab overview ${active==="ov"?"active":""}" onclick="go('ov')">Genel Bakış</button>`;
  brands.forEach((b,i)=>{
    const dots = b.plats.map(p=>`<span class="dot ${p}"></span>`).join("");
    h += `<button class="tab ${active===i?"active":""}" onclick="go(${i})"><span class="dots">${dots}</span>${b.name}</button>`;
  });
  t.innerHTML = h;
  const act = t.querySelector(".tab.active");
  if(act) act.scrollIntoView({inline:"center",block:"nearest",behavior:"smooth"});
}

function overview(){
  const e = extra;
  let intro = e.intro.map(p=>`<p>${p}</p>`).join("");
  let rows = e.sumrows.map((r,i)=>{
    return `<tr><td class="brand" onclick="goByName('${r[0].replace(/'/g,"\\'")}')">${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td><td>${r[4]}</td></tr>`;
  }).join("");
  return `<div class="panel ov">
    <div class="panel-body">
      <div class="ov-kicker">Giriş</div>
      <h2>Bu rehber nasıl kullanılır</h2>
      ${intro}
      <div style="margin-top:24px;" class="ov-kicker">Genel Bakış</div>
      <h2 style="font-size:22px;">Marka Özeti</h2>
      <table class="summary">
        <thead><tr><th>Marka</th><th>Platform</th><th>Müşteri Profili</th><th>Ort. ROAS</th><th>Aylık Bütçe</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <p class="tbl-foot">${e.foot}</p>
    </div>
  </div>`;
}

function brandPanel(i){
  const b = brands[i];
  const badges = b.plats.map(p=>`<span class="badge ${p}">${platName[p]}</span>`).join("");
  const rows = b.rows.map(r=>`<div class="row"><div class="k">${r[0]}</div><div class="v">${r[1]}</div></div>`).join("");
  const metrics = b.metrics.map(m=>`<div class="metric"><div class="ml">${m[0]}</div><div class="mv">${m[1]}</div></div>`).join("");
  const note = b.note ? `<div class="note">${b.note}</div>` : "";
  let hus = "";
  if(b.hususlar && b.hususlar.length){
    hus = `<div class="hususlar"><div class="ht">Kritik Hususlar</div><ul>${b.hususlar.map(x=>`<li>${x}</li>`).join("")}</ul></div>`;
  }
  const prev = i>0 ? i-1 : null;
  const next = i<brands.length-1 ? i+1 : null;
  const nav = `<div class="navbtns">
     <button class="navbtn" ${prev===null?"disabled":""} onclick="go(${prev})">${prev!==null?"← "+brands[prev].name:"←"}</button>
     <button class="navbtn" ${next===null?"disabled":""} onclick="go(${next})">${next!==null?brands[next].name+" →":"→"}</button>
   </div>`;
  return `<div class="panel">
    <div class="panel-head">
      <div class="name">${b.name}</div>
      <div class="cat">${b.cat}</div>
      <div class="badges">${badges}</div>
    </div>
    <div class="panel-body">
      ${rows}
      <div class="metrics">${metrics}</div>
      ${note}
      ${hus}
    </div>
  </div>${nav}`;
}

function render(){
  const p = document.getElementById("panel");
  p.innerHTML = active==="ov" ? overview() : brandPanel(active);
  document.getElementById("footname").textContent = active==="ov" ? "Genel Bakış" : brands[active].name;
  tabBar();
  window.scrollTo({top:0,behavior:"smooth"});
}
function go(x){ active = x; render(); }
function goByName(n){ const i = brands.findIndex(b=>b.name===n); if(i>=0) go(i); }

document.addEventListener("keydown",e=>{
  if(active==="ov") return;
  if(e.key==="ArrowRight" && active<brands.length-1) go(active+1);
  if(e.key==="ArrowLeft" && active>0) go(active-1);
});

render();
</script>
</body>
</html>
